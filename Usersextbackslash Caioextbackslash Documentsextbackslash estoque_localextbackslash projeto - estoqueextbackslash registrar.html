<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APORÉ — Registrar produto</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a1111;
      color: #fff;
      padding: 28px 16px 48px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #111827;
      border: 1px solid #1d7276;
      border-radius: 20px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .subtitle {
      color: #b8d4d5;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #dff4f4;
    }

    input, select, textarea, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #1d7276;
      padding: 12px 14px;
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    input, select, textarea {
      background: #0b1111;
      color: #fff;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      margin-top: 4px;
    }

    button {
      background: #1de1ea;
      color: #081313;
      font-weight: bold;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .msg {
      margin-top: 12px;
      color: #8ef7ff;
    }

    .nav {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav a {
      text-decoration: none;
      color: #fff;
      border: 1px solid #1d7276;
      padding: 10px 14px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registrar produto</h1>
    <p class="subtitle">Cadastre itens no estoque local da APORÉ com status, lote, etapa e responsáveis.</p>

    <form id="formProduto">
      <div class="grid">
        <div>
          <label for="nome">Nome do produto</label>
          <input id="nome" name="nome" type="text" placeholder="Ex: Bolsa Cora" required>
        </div>
        <div>
          <label for="preco">Preço</label>
          <input id="preco" name="preco" type="number" min="0" step="0.01" placeholder="0,00">
        </div>
        <div>
          <label for="categoria">Categoria</label>
          <select id="categoria" name="categoria">
            <option value="bolsa">bolsa</option>
            <option value="produto">produto</option>
            <option value="material">material</option>
            <option value="insumo">insumo</option>
            <option value="amostra">amostra</option>
          </select>
        </div>
        <div>
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="Em produção">Em produção</option>
            <option value="Aguardando aprovação">Aguardando aprovação</option>
            <option value="Em estoque">Em estoque</option>
            <option value="Reservado">Reservado</option>
            <option value="Vendido">Vendido</option>
            <option value="Separado para feira">Separado para feira</option>
            <option value="Uso interno / amostra">Uso interno / amostra</option>
            <option value="Com ajuste pendente">Com ajuste pendente</option>
          </select>
        </div>
        <div>
          <label for="responsavel">Responsável</label>
          <select id="responsavel" name="responsavel">
            <option value="Caio">Caio</option>
            <option value="Mãe">Mãe</option>
            <option value="Julia">Julia</option>
            <option value="Túlio">Túlio</option>
            <option value="Carlos">Carlos</option>
            <option value="APORÉ">APORÉ</option>
          </select>
        </div>
        <div>
          <label for="colaboradores">Colaboradores</label>
          <input id="colaboradores" name="colaboradores" type="text" placeholder="Ex: Mãe, Julia">
        </div>
        <div>
          <label for="lote">Lote</label>
          <input id="lote" name="lote" type="text" placeholder="Ex: LOTE-CORA-001">
        </div>
        <div>
          <label for="etapa">Etapa</label>
          <select id="etapa" name="etapa">
            <option value="Corte">Corte</option>
            <option value="Costura">Costura</option>
            <option value="Fechamento">Fechamento</option>
            <option value="Acabamento">Acabamento</option>
            <option value="Aguardando aprovação">Aguardando aprovação</option>
            <option value="Finalizado">Finalizado</option>
            <option value="Revisão / ajuste">Revisão / ajuste</option>
          </select>
        </div>
        <div>
          <label for="quantidade">Quantidade</label>
          <input id="quantidade" name="quantidade" type="number" min="1" value="1">
        </div>
        <div>
          <label for="foto">Foto (URL)</label>
          <input id="foto" name="foto" type="url" placeholder="https://...">
        </div>
      </div>

      <div style="margin-top: 12px;">
        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" placeholder="Descreva o produto, acabamento ou observações."></textarea>
      </div>

      <div style="margin-top: 12px;">
        <label for="observacoesInternas">Observações internas</label>
        <textarea id="observacoesInternas" name="observacoesInternas" placeholder="Use este campo para notas internas."></textarea>
      </div>

      <div class="actions">
        <button type="submit">Cadastrar produto</button>
        <button type="button" id="limparFormulario">Limpar formulário</button>
      </div>
    </form>

    <p class="msg" id="msgCadastro"></p>

    <div class="nav">
      <a href="index.html">Início</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="operacao.html">Operação / leitura</a>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
