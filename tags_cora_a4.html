<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tags Cora A4 - LUCIMAR</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

  <style>
    :root {
      --papel: #fbf4e8;
      --papel-sombra: #ead9bd;
      --grafite: #25211f;
      --caramelo: #b8744e;
      --terracota: #8f4938;
      --oliva: #6e7650;
      --linha: #cdb995;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #f3eadb;
      color: var(--grafite);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 10mm 0;
    }

    .folha {
      width: 210mm;
      min-height: 297mm;
      padding: 8mm 8mm;
      background: #fff;
      display: grid;
      grid-template-columns: repeat(2, 90mm);
      grid-auto-rows: 45mm;
      gap: 3mm 8mm;
      align-content: start;
      justify-content: center;
    }

    .tag {
      width: 90mm;
      height: 45mm;
      display: block;
      overflow: visible;
    }

    .print-actions {
      width: 210mm;
      margin: 0 auto 6mm;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .print-actions button {
      border: 1px solid #9e8569;
      border-radius: 6px;
      padding: 10px 14px;
      background: #25211f;
      color: #fffaf0;
      font: 700 14px/1 Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      html,
      body {
        width: 210mm;
        min-height: 297mm;
        padding: 0;
        background: #fff;
      }

      .print-actions {
        display: none;
      }

      .folha {
        width: 210mm;
        min-height: 297mm;
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <div class="print-actions">
    <button type="button" onclick="window.print()">Imprimir tags</button>
  </div>

  <main class="folha" id="folhaTags" aria-label="Folha A4 com 12 tags Cora"></main>

  <script>
    const codigosCora = Array.from({ length: 12 }, (_, index) => {
      return "C" + String(index + 1).padStart(3, "0");
    });

    function tagCoraSvg(codigo, index) {
      const barcodeId = `barcode-${index}`;

      return `
        <svg class="tag" viewBox="0 0 90 45" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tag Bolsa Cora ${codigo}">
          <defs>
            <pattern id="paper-${index}" width="4" height="4" patternUnits="userSpaceOnUse">
              <rect width="4" height="4" fill="#fbf4e8"/>
              <path d="M0 1.2H4M1.4 0V4" stroke="#ead9bd" stroke-width="0.08" opacity="0.75"/>
            </pattern>

            <clipPath id="safe-${index}">
              <rect x="2.5" y="2.5" width="85" height="40" rx="2.2"/>
            </clipPath>
          </defs>

          <g class="fundo">
            <rect x="0.5" y="0.5" width="89" height="44" rx="2.4" fill="url(#paper-${index})" stroke="#cdb995" stroke-width="0.35" stroke-dasharray="1.6 1.2"/>
            <rect x="2.5" y="2.5" width="85" height="40" rx="2.2" fill="none" stroke="#dbc8a7" stroke-width="0.25"/>
          </g>

          <g class="furo">
            <circle cx="45" cy="4.5" r="2.25" fill="#fffdf7" stroke="#b8a486" stroke-width="0.35"/>
            <circle cx="45" cy="4.5" r="1.1" fill="none" stroke="#d7c7ab" stroke-width="0.22"/>
          </g>

          <g clip-path="url(#safe-${index})">
            <g class="marca-cora">
              <rect x="3.6" y="6.5" width="27" height="34.5" rx="1.4" fill="#fff7ea" opacity="0.78"/>
              <text x="5.2" y="13" font-family="Georgia, 'Times New Roman', serif" font-size="8.8" font-weight="700" letter-spacing="0.8" fill="#b8744e">CORA</text>
              <text x="5.2" y="21.2" font-family="Georgia, 'Times New Roman', serif" font-size="8.8" font-weight="700" letter-spacing="0.8" fill="#8f4938">CORA</text>
              <text x="5.2" y="29.4" font-family="Georgia, 'Times New Roman', serif" font-size="8.8" font-weight="700" letter-spacing="0.8" fill="#b8744e">CORA</text>
              <text x="5.2" y="37.6" font-family="Georgia, 'Times New Roman', serif" font-size="8.8" font-weight="700" letter-spacing="0.8" fill="#8f4938">CORA</text>
              <rect x="27" y="8" width="1.2" height="1.2" fill="#6e7650"/>
              <rect x="23.7" y="36.6" width="1.2" height="1.2" fill="#6e7650"/>
              <circle cx="28.2" cy="22.6" r="0.75" fill="#b8744e"/>
              <circle cx="7.2" cy="39.3" r="0.55" fill="#6e7650"/>
            </g>

            <g class="icones" fill="none" stroke="#6e7650" stroke-width="0.55" stroke-linecap="round" stroke-linejoin="round">
              <path d="M35.5 10.2c1.2-1.4 3.4-1.4 4.6 0c-1.2 1.4-3.4 1.4-4.6 0Z"/>
              <path d="M37.8 8.6v3.2"/>
              <path d="M36.4 17.7h2.8M37.8 16.3v2.8"/>
              <path d="M36.3 25.5l1.5-1.5l1.5 1.5l-1.5 1.5Z"/>
              <path d="M35.9 33.7c1.1-1.3 2.7-1.3 3.8 0M35.9 35.7c1.1-1.3 2.7-1.3 3.8 0"/>
            </g>

            <g class="textos-fixos" font-family="Arial, Helvetica, sans-serif" font-size="2.65" font-weight="700" letter-spacing="0.08" fill="#25211f">
              <text x="42" y="11.2">PRODUCAO ARTESANAL</text>
              <text x="42" y="18.6">FEITO NESTE MESMO ENDERECO</text>
              <text x="42" y="26">PECAS UNICAS E LIMITADAS</text>
              <text x="42" y="33.4">PROCESSO MANUAL E RESPONSAVEL</text>
            </g>

            <g class="divisorias" stroke="#cdb995" stroke-width="0.22">
              <path d="M32 7.2V39.5"/>
              <path d="M62.5 8.4V38.8"/>
              <path d="M42 14.1H60.5M42 21.5H60.5M42 28.9H60.5"/>
            </g>

            <g class="codigo-barras">
              <rect x="64.2" y="9.2" width="20.4" height="17.4" rx="1" fill="#fffdf8" stroke="#ddcdae" stroke-width="0.22"/>
              <svg id="${barcodeId}" x="65.2" y="10.6" width="18.4" height="12.8"></svg>
            </g>

            <g class="codigo-textual">
              <text x="74.4" y="30.9" text-anchor="middle" font-family="'Courier New', monospace" font-size="4.2" font-weight="700" letter-spacing="0.45" fill="#25211f">${codigo}</text>
              <text x="74.4" y="35.1" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="2.4" font-weight="700" letter-spacing="0.08" fill="#8f4938">BOLSA CORA</text>
            </g>

            <g class="marca-apore">
              <text x="85" y="40.4" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="2.1" font-weight="700" letter-spacing="0.12" fill="#6e7650">APORE SOM E IMAGEM</text>
            </g>
          </g>
        </svg>
      `;
    }

    function renderizarGradeTags(codigos) {
      const folha = document.getElementById("folhaTags");
      folha.innerHTML = codigos.map(tagCoraSvg).join("");
    }

    function gerarCodigosBarras(codigos) {
      codigos.forEach((codigo, index) => {
        JsBarcode(`#barcode-${index}`, codigo, {
          format: "CODE128",
          lineColor: "#000000",
          background: "#fffdf8",
          width: 1.45,
          height: 34,
          displayValue: false,
          margin: 0
        });
      });
    }

    renderizarGradeTags(codigosCora);

    window.addEventListener("load", () => {
      gerarCodigosBarras(codigosCora);
    });
  </script>
</body>
</html>
